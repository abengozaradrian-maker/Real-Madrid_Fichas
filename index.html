<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Madrid</title>
    <style>
        div{
            box-shadow: 3px 3px 3px black;

        }
        #contenedor{
            background-color: purple;
            padding: 20px;
            display: flex;
            justify-content: space-around;
        }
        #contenedor div{
            background-color: white;
            padding: 20px;
            display: center;
            width: 30%;
        }
        img{
            width: 200px;
        }
        table#tabla-jugadores,td,th{
            border: 2px solid purple;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <h1>Jugadores del Real Madrid</h1>
    <iframe width="100%" height="300" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/soundcloud%253Atracks%253A151339248&color=%23ff5500&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true"></iframe><div style="font-size: 10px; color: #cccccc;line-break: anywhere;word-break: normal;overflow: hidden;white-space: nowrap;text-overflow: ellipsis; font-family: Interstate,Lucida Grande,Lucida Sans Unicode,Lucida Sans,Garuda,Verdana,Tahoma,sans-serif;font-weight: 100;"><a href="https://soundcloud.com/rizki-hidayat-8" title="Rizki Hidayat 7" target="_blank" style="color: #cccccc; text-decoration: none;">Rizki Hidayat 7</a> · <a href="https://soundcloud.com/rizki-hidayat-8/hala-madrid-y-nada-m-s-la" title="Hala Madrid y Nada Más - La canción de la Décima.mp3" target="_blank" style="color: #cccccc; text-decoration: none;">Hala Madrid y Nada Más - La canción de la Décima.mp3</a></div>
    <div id="contenedor">

    </div>
    <table id="tabla-jugadores">

    </table>
    <script>
        let jugadores = [
            {
                nombre:"Mbappé",
                edad:28,
                ficha:20000000,
                foto: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/9c/Picture_with_Mbapp%C3%A9_%28cropped%29_%28cropped%29.jpg/250px-Picture_with_Mbapp%C3%A9_%28cropped%29_%28cropped%29.jpg"
            },
            {
                nombre:"Raúl",
                edad:48,
                ficha:30000000,
                foto: "https://upload.wikimedia.org/wikipedia/commons/thumb/9/91/Raul_2011-08-03-2_%28cropped%29.jpg/250px-Raul_2011-08-03-2_%28cropped%29.jpg"
            },
            {
                nombre:"Butragueño",
                edad:40,
                ficha:50000000,
                foto: "https://upload.wikimedia.org/wikipedia/commons/f/f4/Emilio_Butrague%C3%B1o_2015_%28cropped%29.jpg"
            },
            {
                nombre:"Zidane",
                edad:42,
                ficha:30000000,
                foto: "https://upload.wikimedia.org/wikipedia/commons/f/f3/Zinedine_Zidane_by_Tasnim_03.jpg"

            },
        ]
        for (let i=0;i<jugadores.length;i++){
            //jugador = jugadores[i];
            nombreJugador = jugadores[i].nombre;
            edadJugador = jugadores[i].edad;
            fichaJugador =jugadores[i].ficha;
            fotoJugador = jugadores[i].foto;
            nuevaCaja = document.createElement("div");
            nuevoH1=document.createElement("h1");
            nuevoH1.innerHTML = nombreJugador;
            nuevaCaja.appendChild(nuevoH1);
            //creo un h2 para contenedor la edad
            nuevoH2=document.createElement("h2");
            nuevoH2.innerHTML="Edad:" + edadJugador;
            nuevaCaja.appendChild(nuevoH2);
            //creo un h3 para contenedor de la ficha
            nuevoH3=document.createElement("h3");
            nuevoH3.innerHTML="Ficha:" + fichaJugador;
            nuevaCaja.appendChild(nuevoH3);
            nuevaFoto = document.createElement("img");
            nuevaFoto.src = fotoJugador;
            nuevaCaja.appendChild(nuevaFoto)
            //finalmente agregamos la caja al contenedor 
            document.getElementById("contenedor").appendChild(nuevaCaja);

        }
        let nuevoTRCabecera = document.createElement("tr");
        let cabeceraNombre = document.createElement("th");
        cabeceraNombre.innerHTML="Nombre";
        nuevoTRCabecera.appendChild(cabeceraNombre);
        document.getElementById("tabla-jugadores").appendChild(nuevoTRCabecera);

        for ( jugador of jugadores){
            let nuevoTR = document.createElement("tr");
            let tdNombre = document.createElement("td"); 
            tdNombre.innerHTML = jugador.nombre;
            nuevoTR.appendChild(tdNombre);
            let tdEdad = document.createElement("td"); 
            tdEdad.innerHTML = jugador.edad;
            nuevoTR.appendChild(tdEdad);
            let tdFicha = document.createElement("td"); 
            tdFicha.innerHTML = jugador.ficha;
            nuevoTR.appendChild(tdFicha);
            let tdFoto = document.createElement("td"); 
            let nuevaFoto = document.createElement("img");
            nuevaFoto.src = jugador.foto;
            tdFoto.appendChild(nuevaFoto);
            nuevoTR.appendChild(tdFoto);
            document.getElementById("tabla-jugadores").appendChild(nuevoTR);
        }

    </script>
</body>
</html>
